server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static frontend files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }
}
