<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Student Management System</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-brand">
      <div class="mark">HS</div>
      <h1>Create Account</h1>
      <p>Register to start managing</p>
    </div>

    <div id="alert" class="auth-alert"></div>

    <form id="register-form">
      <div class="field">
        <label for="full_name">Fullname</label>
        <input type="text" id="full_name" name="full_name" required>
      </div>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required minlength="3">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="6">
        <div class="field-error" style="display:none">Password must be at least 6 characters</div>
      </div>
      <button type="submit" class="btn btn-primary" id="register-btn">Register</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/config.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
