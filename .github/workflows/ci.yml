name: Student Management CI

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start services
        run: docker compose -f docker-compose.ci.yml up -d --build

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Backend ready"
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not become healthy in time"
          docker compose -f docker-compose.ci.yml logs backend
          exit 1

      - name: Wait for frontend health
        run: |
          for i in {1..30}; do
            if curl -f http://localhost > /dev/null 2>&1; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 5
          done
          echo "Frontend did not become healthy in time"
          docker compose -f docker-compose.ci.yml logs frontend
          exit 1

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
